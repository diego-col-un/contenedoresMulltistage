name: Pipeline de CI/CD (Build & Deploy)

on:
  push:
    branches: [ "main" ] # Se activa cuando subes código a la rama main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. Clonar el código de Go que subiste a GitHub
    - name: Checkout del código
      uses: actions/checkout@v4

    # 2. Iniciar sesión en el registro de Docker (Docker Hub)
    - name: Autenticar en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 3. CONSTRUIR LA IMAGEN (Aquí ocurre el Multi-stage)
    - name: Construir imagen Docker
      run: |
        docker build -t mi-usuario-docker/mi-app-go:latest .

    # 4. SUBIR LA IMAGEN (¡Aquí se nota la magia!)
    # Como solo pesa 12MB gracias al Multi-stage, este paso toma 2 segundos en la red de GitHub.
    - name: Subir imagen a Docker Hub
      run: |
        docker push diaristizabalg/mi-app-go:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    # 5. DESPLEGAR EN TU SERVIDOR
    # Tu servidor descarga la imagen de 12MB. Si el contenedor viejo falla,
    # el nuevo arranca en milisegundos porque Alpine no pesa nada.
    - name: Desplegar en Servidor de Producción
      run: |
        echo "Descargando imagen ultra-ligera de 12MB..."
        # comando para actualizar el contenedor en tu servidor web (ej. docker-compose pull && docker-compose up -d)
